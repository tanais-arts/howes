<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Howes — PDF → DOCX</title>
  <style>body{font-family:Arial;margin:24px}label{display:block;margin-top:8px}</style>
</head>
<body>
  <h1>Howes — PDF → DOCX</h1>
  <form action="/process" method="post" enctype="multipart/form-data">
    <label>Choisissez le PDF : <input type="file" name="pdf" accept="application/pdf" required></label>
    <label><input type="checkbox" name="autodetect" checked> Essayer l'auto-détection des chapitres</label>
    <label>Si vous préférez fournir des plages manuelles (format JSON array of [start,end] 0-based pages):</label>
    <textarea name="ranges" style="width:100%;height:80px" placeholder='ex: [[0,4],[5,9]]'></textarea>
    <div style="margin-top:12px"><button type="submit">Générer DOCX</button></div>
  </form>
</body>
</html>
